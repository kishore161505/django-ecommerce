{% extends "base.html" %}

{% block title %}
Review
{% endblock %}

{% block content %}

<h1>Review for {{ product.name }}</h1>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Save Review

    </button>

</form>

<br>

<a href="{% url 'product_detail' product.slug %}">

    Back to Product

</a>

{% endblock %}
